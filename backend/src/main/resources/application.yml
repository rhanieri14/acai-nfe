spring:
  application:
    name: acai-nfe-backend
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: jdbc:postgresql://postgres:5432/acainfe
    username: acainfe
    password: acainfe123
    driver-class-name: org.postgresql.Driver

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.acainfe: DEBUG
