services:
  postgres:
    image: postgres:15-alpine
    container_name: acainfe-postgres
    environment:
      POSTGRES_DB: acainfe
      POSTGRES_USER: acainfe
      POSTGRES_PASSWORD: acainfe123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acainfe"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acainfe-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acainfe-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/acainfe
      SPRING_DATASOURCE_USERNAME: acainfe
      SPRING_DATASOURCE_PASSWORD: acainfe123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - acainfe-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acainfe-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - acainfe-network

volumes:
  postgres_data:
    driver: local

networks:
  acainfe-network:
    driver: bridge
