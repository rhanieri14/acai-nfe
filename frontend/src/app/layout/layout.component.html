<div class="layout-container">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" [class.sidebar-hidden]="!sidebarVisible">

    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <i class="pi pi-heart-fill"></i>
        </div>
        <div class="logo-text">
          <span class="logo-name">AçaíNFe</span>
          <span class="logo-sub">PDV & Fiscal</span>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="nav-section-label">Atendimento</span>
        <div *ngFor="let item of menuAtendimento"
             class="menu-item"
             [routerLink]="item.route"
             routerLinkActive="active">
          <div class="menu-icon">
            <i [class]="item.icon"></i>
          </div>
          <span>{{ item.label }}</span>
        </div>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">Gestão</span>
        <div *ngFor="let item of menuGestao"
             class="menu-item"
             [routerLink]="item.route"
             routerLinkActive="active">
          <div class="menu-icon">
            <i [class]="item.icon"></i>
          </div>
          <span>{{ item.label }}</span>
        </div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="sidebar-footer-btn" [routerLink]="'/configuracoes'" routerLinkActive="active">
        <i class="pi pi-cog"></i>
        <span>Configurações</span>
      </button>
    </div>

  </aside>

  <!-- ── Main Content ── -->
  <div class="main-content" [class.expanded]="!sidebarVisible">

    <header class="topbar">
      <div class="topbar-left">
        <button class="toggle-btn" (click)="toggleSidebar()">
          <i class="pi pi-bars"></i>
        </button>
        <h1 class="page-title">{{ pageTitle }}</h1>
      </div>
      <div class="topbar-right">
        <div class="topbar-avatar">
          <i class="pi pi-user"></i>
        </div>
      </div>
    </header>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
